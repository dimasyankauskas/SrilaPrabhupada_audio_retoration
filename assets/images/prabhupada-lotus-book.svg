<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Saffron rounded square background, matching the mockup's icon -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#E07A1F"/>
  <!-- Subtle inner gradient highlight -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#g)" opacity="0.18"/>

  <!-- Open book — two pages fanning outward -->
  <g transform="translate(32 46)">
    <path d="M-22 -2 Q-22 4 -20 6 L-1 6 L-1 -6 Q-12 -8 -22 -2 Z" fill="#fcf9f2" opacity="0.95"/>
    <path d="M 22 -2 Q 22 4  20 6 L  1 6 L  1 -6 Q 12 -8  22 -2 Z" fill="#fcf9f2" opacity="0.95"/>
    <!-- Page lines -->
    <path d="M-19 0 H-4" stroke="#E07A1F" stroke-width="0.7" stroke-linecap="round" opacity="0.55"/>
    <path d="M-19 3 H-6" stroke="#E07A1F" stroke-width="0.7" stroke-linecap="round" opacity="0.45"/>
    <path d="M 19 0 H 4" stroke="#E07A1F" stroke-width="0.7" stroke-linecap="round" opacity="0.55"/>
    <path d="M 19 3 H 6" stroke="#E07A1F" stroke-width="0.7" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- Lotus flower — central stem -->
  <g transform="translate(32 30)">
    <!-- Outer petals (wider, lower opacity) -->
    <path d="M0 0 C -10 -2 -16 -10 -14 -16 C -8 -14 -2 -8 0 0 Z" fill="#fcf9f2" opacity="0.88"/>
    <path d="M0 0 C  10 -2  16 -10  14 -16 C  8 -14  2 -8 0 0 Z" fill="#fcf9f2" opacity="0.88"/>
    <!-- Inner petals (sharper, full opacity) -->
    <path d="M0 0 C -6 -4 -8 -12 -3 -16 C -1 -10 0 -4 0 0 Z" fill="#fcf9f2"/>
    <path d="M0 0 C  6 -4  8 -12  3 -16 C  1 -10 0 -4 0 0 Z" fill="#fcf9f2"/>
    <!-- Center bud -->
    <path d="M0 -2 C -2 -6 -2 -12 0 -16 C 2 -12 2 -6 0 -2 Z" fill="#fcf9f2"/>
    <!-- Stem -->
    <line x1="0" y1="0" x2="0" y2="14" stroke="#fcf9f2" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  </g>

  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
</svg>
